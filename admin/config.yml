backend:
  name: github
  repo: elmmdo/elmmdo.github.io
  branch: main
  base_url: https://decap-oauth.elmmdo78.workers.dev
  auth_endpoint: /auth

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

locale: "fa"

collections:
  - name: "posts"
    label: "نوشته‌ها"
    label_singular: "نوشته"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}}"
    fields:
      - label: "عنوان"
        name: "title"
        widget: "string"

      - label: "توضیح کوتاه"
        name: "description"
        widget: "text"
        required: false

      - label: "تاریخ انتشار"
        name: "date"
        widget: "datetime"

      - label: "نویسنده"
        name: "author"
        widget: "string"
        default: "Elmmdo"
        required: false

      - label: "دسته‌بندی"
        name: "category"
        widget: "select"
        options:
          - "علمی"
          - "فناوری"
          - "آموزشی"
          - "عمومی"
        required: false

      - label: "برچسب‌ها"
        name: "tags"
        widget: "list"
        required: false
        field:
          label: "برچسب"
          name: "tag"
          widget: "string"

      - label: "تصویر شاخص"
        name: "image"
        widget: "image"
        required: false

      - label: "نوشته ویژه"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

      - label: "پیش‌نویس"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "متن کامل"
        name: "body"
        widget: "markdown"
