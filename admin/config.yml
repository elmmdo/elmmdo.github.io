backend:
  name: github
  repo: elmmdo/elmmdo.github.io
  branch: main
  base_url: https://decap-oauth.elmmdo78.workers.dev
  auth_endpoint: /auth

locale: "fa"

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  # ==========================================
  # نوشته‌ها
  # ==========================================
  - name: "posts"
    label: "نوشته‌ها"
    label_singular: "نوشته"
    description: "مدیریت نوشته‌ها و مطالب سایت"
    folder: "_posts"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title"
    summary: "{{title}} | {{date}}"

    sortable_fields:
      - "title"
      - "date"
      - "category"
      - "author"

    view_filters:
      - label: "نوشته‌های ویژه"
        field: "featured"
        pattern: "true"

      - label: "پیش‌نویس‌ها"
        field: "draft"
        pattern: "true"

      - label: "نوشته‌های منتشرشده"
        field: "draft"
        pattern: "false"

    view_groups:
      - label: "دسته‌بندی"
        field: "category"

      - label: "نویسنده"
        field: "author"

    fields:
      - label: "عنوان نوشته"
        name: "title"
        widget: "string"
        required: true

      - label: "توضیح کوتاه"
        name: "description"
        widget: "text"
        required: false

      - label: "تاریخ انتشار"
        name: "date"
        widget: "datetime"
        required: true
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm:ss Z"

      - label: "نویسنده"
        name: "author"
        widget: "string"
        default: "Elmmdo"
        required: false

      - label: "دسته‌بندی"
        name: "category"
        widget: "select"
        required: false
        options:
          - label: "علمی"
            value: "علمی"
          - label: "فناوری"
            value: "فناوری"
          - label: "آموزشی"
            value: "آموزشی"
          - label: "برنامه‌نویسی"
            value: "برنامه‌نویسی"
          - label: "عمومی"
            value: "عمومی"

      - label: "برچسب‌ها"
        name: "tags"
        widget: "list"
        required: false
        allow_add: true
        field:
          label: "برچسب"
          name: "tag"
          widget: "string"

      - label: "تصویر شاخص"
        name: "image"
        widget: "image"
        required: false
        choose_url: true
        media_library:
          config:
            multiple: false

      - label: "متن جایگزین تصویر"
        name: "image_alt"
        widget: "string"
        required: false
        hint: "توضیح کوتاهی از تصویر برای دسترس‌پذیری و سئو وارد کنید."

      - label: "نوشته ویژه"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

      - label: "پیش‌نویس"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "متن کامل نوشته"
        name: "body"
        widget: "markdown"
        required: true

  # ==========================================
  # صفحه‌های ثابت
  # ==========================================
  - name: "pages"
    label: "صفحه‌ها"
    label_singular: "صفحه"
    description: "مدیریت صفحه‌های ثابت سایت"
    delete: false

    files:
      # --------------------------------------
      # درباره
      # --------------------------------------
      - label: "درباره"
        name: "about"
        file: "about.md"

        fields:
          - label: "عنوان"
            name: "title"
            widget: "string"
            required: true

          - label: "آدرس صفحه"
            name: "permalink"
            widget: "string"
            required: false
            hint: "برای نمونه: /about/"

          - label: "توضیح کوتاه"
            name: "description"
            widget: "text"
            required: false

          - label: "تصویر صفحه"
            name: "image"
            widget: "image"
            required: false
            choose_url: true
            media_library:
              config:
                multiple: false

          - label: "نمایش در منو"
            name: "show_in_menu"
            widget: "boolean"
            default: true
            required: false

          - label: "ترتیب نمایش"
            name: "order"
            widget: "number"
            default: 1
            value_type: "int"
            min: 1
            required: false

          - label: "متن صفحه"
            name: "body"
            widget: "markdown"
            required: false
            hint: "محتوای صفحه درباره را در این قسمت بنویسید."

      # --------------------------------------
      # بایگانی
      # --------------------------------------
      - label: "بایگانی"
        name: "archive"
        file: "archive.md"

        fields:
          - label: "عنوان"
            name: "title"
            widget: "string"
            required: true

          - label: "آدرس صفحه"
            name: "permalink"
            widget: "string"
            required: false
            hint: "برای نمونه: /archive/"

          - label: "توضیح کوتاه"
            name: "description"
            widget: "text"
            required: false

          - label: "کد صفحه"
            name: "body"
            widget: "text"
            required: false
            hint: "این قسمت شامل کد HTML و Liquid است؛ ساختار و علائم کد را تغییر ندهید."

      # --------------------------------------
      # دسته‌بندی‌ها
      # --------------------------------------
      - label: "دسته‌بندی‌ها"
        name: "categories"
        file: "categories.md"

        fields:
          - label: "عنوان"
            name: "title"
            widget: "string"
            required: true

          - label: "آدرس صفحه"
            name: "permalink"
            widget: "string"
            required: false
            hint: "برای نمونه: /categories/"

          - label: "کد صفحه"
            name: "body"
            widget: "text"
            required: false
            hint: "این قسمت شامل کد HTML و Liquid است؛ ساختار و علائم کد را تغییر ندهید."

      # --------------------------------------
      # برچسب‌ها
      # --------------------------------------
      - label: "برچسب‌ها"
        name: "tags"
        file: "tags.md"

        fields:
          - label: "عنوان"
            name: "title"
            widget: "string"
            required: true

          - label: "آدرس صفحه"
            name: "permalink"
            widget: "string"
            required: false
            hint: "برای نمونه: /tags/"

          - label: "کد صفحه"
            name: "body"
            widget: "text"
            required: false
            hint: "این قسمت شامل کد HTML و Liquid است؛ ساختار و علائم کد را تغییر ندهید."

      # --------------------------------------
      # جست‌وجو
      # --------------------------------------
      - label: "جست‌وجو"
        name: "search"
        file: "search.md"

        fields:
          - label: "عنوان"
            name: "title"
            widget: "string"
            required: true

          - label: "آدرس صفحه"
            name: "permalink"
            widget: "string"
            required: false
            hint: "برای نمونه: /search/"

          - label: "کد صفحه"
            name: "body"
            widget: "text"
            required: false
            hint: "این قسمت ممکن است شامل HTML، JavaScript یا Liquid باشد؛ ساختار و علائم کد را تغییر ندهید."

  # ==========================================
  # پروژه‌ها
  # ==========================================
  - name: "projects"
    label: "پروژه‌ها"
    label_singular: "پروژه"
    description: "مدیریت نمونه‌کارها و پروژه‌ها"
    folder: "_projects"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}}"

    sortable_fields:
      - "title"
      - "date"

    view_filters:
      - label: "پروژه‌های ویژه"
        field: "featured"
        pattern: "true"

    fields:
      - label: "عنوان پروژه"
        name: "title"
        widget: "string"
        required: true

      - label: "توضیح کوتاه"
        name: "description"
        widget: "text"
        required: true

      - label: "تاریخ پروژه"
        name: "date"
        widget: "datetime"
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "تصویر پروژه"
        name: "image"
        widget: "image"
        required: false
        choose_url: true
        media_library:
          config:
            multiple: false

      - label: "آدرس پروژه"
        name: "url"
        widget: "string"
        required: false
        hint: "نشانی کامل پروژه را همراه با https:// وارد کنید."

      - label: "مخزن GitHub"
        name: "github"
        widget: "string"
        required: false
        hint: "نشانی کامل مخزن GitHub را وارد کنید."

      - label: "فناوری‌ها"
        name: "technologies"
        widget: "list"
        required: false
        allow_add: true
        field:
          label: "فناوری"
          name: "technology"
          widget: "string"

      - label: "پروژه ویژه"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

      - label: "توضیحات کامل پروژه"
        name: "body"
        widget: "markdown"
        required: false

  # ==========================================
  # تنظیمات سایت
  # ==========================================
  - name: "settings"
    label: "تنظیمات سایت"
    label_singular: "تنظیمات"
    description: "مدیریت اطلاعات عمومی و شبکه‌های اجتماعی"
    delete: false

    files:
      - label: "تنظیمات عمومی"
        name: "general"
        file: "_data/settings.yml"

        fields:
          - label: "عنوان سایت"
            name: "site_title"
            widget: "string"
            default: "Elmmdo"
            required: true

          - label: "توضیحات سایت"
            name: "site_description"
            widget: "text"
            required: false

          - label: "لوگوی سایت"
            name: "logo"
            widget: "image"
            required: false
            choose_url: true
            media_library:
              config:
                multiple: false

          - label: "تصویر آیکون سایت"
            name: "favicon"
            widget: "image"
            required: false
            choose_url: true
            media_library:
              config:
                multiple: false

          - label: "نام نویسنده"
            name: "author_name"
            widget: "string"
            default: "Elmmdo"
            required: false

          - label: "ایمیل"
            name: "email"
            widget: "string"
            required: false
            hint: "برای نمونه: name@example.com"

          - label: "لینک GitHub"
            name: "github"
            widget: "string"
            required: false
            hint: "نشانی کامل پروفایل GitHub را وارد کنید."

          - label: "لینک تلگرام"
            name: "telegram"
            widget: "string"
            required: false
            hint: "نشانی کامل حساب یا کانال تلگرام را وارد کنید."

          - label: "لینک اینستاگرام"
            name: "instagram"
            widget: "string"
            required: false
            hint: "نشانی کامل صفحه اینستاگرام را وارد کنید."

          - label: "متن پایین سایت"
            name: "footer_text"
            widget: "string"
            required: false

  
