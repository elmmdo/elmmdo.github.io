<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    >

    <title>مدیریت محتوای سایت</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css"
    >

    <style>
            html,
      body {
        direction: rtl;
        min-height: 100%;
        margin: 0;
        background: #f5f7fa;
      }

      body,
      button,
      input,
      textarea,
      select {
        font-family: Vazirmatn, Tahoma, Arial, sans-serif !important;
      }

      input,
      textarea,
      select {
        direction: rtl;
        text-align: right;
      }

      textarea {
        line-height: 1.9;
      }

      button,
      [role="button"] {
        font-weight: 600;
      }

      [class*="AppHeader"],
      [class*="Sidebar"],
      [class*="CollectionTop"],
      [class*="CollectionControls"],
      [class*="EntriesCollection"],
      [class*="EntryListing"],
      [class*="ControlPane"],
      [class*="EditorContainer"],
      [class*="ToolbarContainer"],
      [class*="Dropdown"],
      [class*="Menu"],
      [class*="Popover"] {
        direction: rtl;
        text-align: right;
      }

      [class*="Sidebar"] {
        position: static !important;
        z-index: auto !important;
        min-width: 300px !important;
        max-width: 340px !important;
        text-align: right;
      }

      [class*="Sidebar"] input {
        direction: rtl;
        text-align: right;
      }

      [class*="CollectionTop"],
      [class*="CollectionControls"],
      [class*="EntriesCollection"],
      [class*="Entries"] {
        margin-right: 0 !important;
        margin-left: 0 !important;
      }

      [class*="CollectionTop"] {
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box;
        align-items: flex-start;
      }

      [class*="CollectionTop"] h1,
      [class*="CollectionTop"] h2,
      [class*="CollectionTop"] p {
        text-align: right !important;
      }

      [class*="ListCard"],
      [class*="ListItem"],
      [class*="EntryListing"] {
        direction: rtl;
        text-align: right;
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box;
      }

      [class*="Search"] input,
      [class*="Control"] input,
      [class*="Control"] textarea {
        direction: rtl;
        text-align: right;
      }

      [class*="IconWrapper"] {
        margin-left: 8px;
        margin-right: 0;
      }

      @media (min-width: 901px) {
        [class*="EntriesCollection"],
        [class*="EntryListing"],
        [class*="Entries"] {
          transform: translateY(-210px) !important;
          margin-left: 40px !important;
          margin-right: 0 !important;
          width: calc(100% - 420px) !important;
          max-width: calc(100% - 420px) !important;
        }
      
        [class*="CollectionTop"],
        [class*="CollectionControls"] {
          margin-top: 0 !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
          width: 100% !important;
          max-width: 100% !important;
        }
      }

    </style>
  </head>

  <body>
    <script src="https://unpkg.com/decap-cms@3.1.10/dist/decap-cms.js"></script>

    <script>
      CMS.registerPreviewStyle(
        "https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css"
      );

      const previewStyles = `
        body {
          direction: rtl;
          max-width: 850px;
          margin: 0 auto;
          padding: 32px;
          color: #1f2937;
          background: #ffffff;
          font-family: Vazirmatn, Tahoma, Arial, sans-serif;
          line-height: 2;
        }

        article {
          width: 100%;
        }

        h1,
        h2,
        h3,
        h4 {
          line-height: 1.5;
        }

        h1 {
          margin-bottom: 16px;
          font-size: 2rem;
        }

        img {
          display: block;
          width: 100%;
          height: auto;
          margin: 24px 0;
          border-radius: 12px;
        }

        .description {
          color: #64748b;
          font-size: 1.05rem;
        }

        .meta {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin: 16px 0 24px;
          color: #64748b;
          font-size: 0.9rem;
        }

        .meta span {
          padding: 4px 10px;
          border-radius: 999px;
          background: #f1f5f9;
        }

        .content {
          margin-top: 24px;
        }

        a {
          color: #2563eb;
        }

        blockquote {
          margin: 24px 0;
          padding: 12px 20px;
          border-right: 4px solid #2563eb;
          background: #f8fafc;
          color: #475569;
        }

        pre {
          overflow-x: auto;
          direction: ltr;
          padding: 16px;
          border-radius: 8px;
          background: #0f172a;
          color: #e2e8f0;
          text-align: left;
        }

        code {
          direction: ltr;
        }
      `;

      CMS.registerPreviewStyle(previewStyles, { raw: true });

      const createElement = React.createElement;

      function PostPreview({ entry, widgetFor }) {
        const data = entry.get("data");

        return createElement(
          "article",
          null,

          data.get("image")
            ? createElement("img", {
                src: data.get("image"),
                alt: data.get("image_alt") || data.get("title") || "",
              })
            : null,

          createElement(
            "h1",
            null,
            data.get("title") || "عنوان نوشته"
          ),

          data.get("description")
            ? createElement(
                "p",
                { className: "description" },
                data.get("description")
              )
            : null,

          createElement(
            "div",
            { className: "meta" },

            data.get("category")
              ? createElement("span", null, data.get("category"))
              : null,

            data.get("author")
              ? createElement("span", null, data.get("author"))
              : null,

            data.get("date")
              ? createElement("span", null, data.get("date"))
              : null
          ),

          createElement(
            "div",
            { className: "content" },
            widgetFor("body")
          )
        );
      }

      function PagePreview({ entry, widgetFor }) {
        const data = entry.get("data");

        return createElement(
          "article",
          null,

          data.get("image")
            ? createElement("img", {
                src: data.get("image"),
                alt: data.get("title") || "",
              })
            : null,

          createElement(
            "h1",
            null,
            data.get("title") || "عنوان صفحه"
          ),

          data.get("description")
            ? createElement(
                "p",
                { className: "description" },
                data.get("description")
              )
            : null,

          createElement(
            "div",
            { className: "content" },
            widgetFor("body")
          )
        );
      }

      function ProjectPreview({ entry, widgetFor }) {
        const data = entry.get("data");
        const technologies = data.get("technologies");

        return createElement(
          "article",
          null,

          data.get("image")
            ? createElement("img", {
                src: data.get("image"),
                alt: data.get("title") || "",
              })
            : null,

          createElement(
            "h1",
            null,
            data.get("title") || "عنوان پروژه"
          ),

          data.get("description")
            ? createElement(
                "p",
                { className: "description" },
                data.get("description")
              )
            : null,

          technologies && technologies.size
            ? createElement(
                "div",
                { className: "meta" },
                technologies
                  .toArray()
                  .map(function (technology, index) {
                    return createElement(
                      "span",
                      { key: technology + "-" + index },
                      technology
                    );
                  })
              )
            : null,

          createElement(
            "div",
            { className: "content" },
            widgetFor("body")
          )
        );
      }

      CMS.registerPreviewTemplate("posts", PostPreview);
      CMS.registerPreviewTemplate("pages", PagePreview);
      CMS.registerPreviewTemplate("projects", ProjectPreview);
    </script>
  </body>
</html>
