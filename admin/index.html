<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    >

    <title>مدیریت محتوای سایت</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css"
    >

    <style>
      html,
      body {
        direction: rtl;
        margin: 0;
        min-height: 100%;
        background: #f5f7fa;
      }

      body,
      button,
      input,
      textarea,
      select {
        font-family: Vazirmatn, Tahoma, Arial, sans-serif !important;
      }

      input,
      textarea {
        direction: rtl;
        text-align: right;
      }

      textarea {
        line-height: 1.9;
      }

      [role="button"],
      button {
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <script src="https://unpkg.com/decap-cms@3.1.10/dist/decap-cms.js"></script>

    <script>
      CMS.registerPreviewStyle(
        "https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css"
      );

      const previewStyles = `
        body {
          direction: rtl;
          max-width: 850px;
          margin: 0 auto;
          padding: 32px;
          color: #1f2937;
          font-family: Vazirmatn, Tahoma, Arial, sans-serif;
          line-height: 2;
        }

        article {
          width: 100%;
        }

        h1,
        h2,
        h3,
        h4 {
          line-height: 1.5;
        }

        h1 {
          margin-bottom: 16px;
          font-size: 2rem;
        }

        img {
          display: block;
          width: 100%;
          height: auto;
          margin: 24px 0;
          border-radius: 12px;
        }

        .description {
          color: #64748b;
          font-size: 1.05rem;
        }

        .meta {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin: 16px 0 24px;
          color: #64748b;
          font-size: 0.9rem;
        }

        .meta span {
          padding: 4px 10px;
          border-radius: 999px;
          background: #f1f5f9;
        }

        .content {
          margin-top: 24px;
        }

        a {
          color: #2563eb;
        }

        pre {
          overflow-x: auto;
          direction: ltr;
          padding: 16px;
          border-radius: 8px;
          background: #0f172a;
          color: #e2e8f0;
          text-align: left;
        }

        code {
          direction: ltr;
        }
      `;

      CMS.registerPreviewStyle(previewStyles, { raw: true });

      const createElement = React.createElement;

      function PostPreview({ entry, widgetFor }) {
        const data = entry.get("data");

        return createElement(
          "article",
          null,
          data.get("image")
            ? createElement("img", {
                src: data.get("image"),
                alt: data.get("image_alt") || data.get("title") || "",
              })
            : null,
          createElement("h1", null, data.get("title") || "عنوان نوشته"),
          data.get("description")
            ? createElement(
                "p",
                { className: "description" },
                data.get("description")
              )
            : null,
          createElement(
            "div",
            { className: "meta" },
            data.get("category")
              ? createElement("span", null, data.get("category"))
              : null,
            data.get("author")
              ? createElement("span", null, data.get("author"))
              : null,
            data.get("date")
              ? createElement("span", null, data.get("date"))
              : null
          ),
          createElement("div", { className: "content" }, widgetFor("body"))
        );
      }

      function PagePreview({ entry, widgetFor }) {
        const data = entry.get("data");

        return createElement(
          "article",
          null,
          data.get("image")
            ? createElement("img", {
                src: data.get("image"),
                alt: data.get("title") || "",
              })
            : null,
          createElement("h1", null, data.get("title") || "عنوان صفحه"),
          data.get("description")
            ? createElement(
                "p",
                { className: "description" },
                data.get("description")
              )
            : null,
          createElement("div", { class = entry.get("data");
        const technologiesbody"))
        );
      }

      function ProjectPreview({ entry, widgetFor }) {
        const data = entry.get("data");
        const technologies = data.get("technologies");

        return createElement(
          "article",
          null,
          data.get("image")
            ? createElement("img", {
                src: data.get("image"),
                alt: data.get("title") || "",
              })
            : null,
          createElement("h1", null, data.get("title") || "عنوان پروژه"),
          data.get("description")
            ? createElement(
                "p",
                { className: "description" },
                data.get("description")
              )
            : null,
          technologies && technologies.size
            ? createElement(
                "div",
                { className: "meta" },
                technologies
                  .toArray()
                  .map((technology) =>
                    createElement("span", { key: technology }, technology)
                  )
              )
            : null,
          createElement("div", { className: "content" }, widgetFor("body"))
        );
      }

      CMS.registerPreviewTemplate("posts", PostPreview);
      CMS.registerPreviewTemplate("pages", PagePreview);
      CMS.registerPreviewTemplate("projects", ProjectPreview);
    </script>
  </body>
</html>
