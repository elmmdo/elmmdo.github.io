<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <nav>
  <a href="{{ '/' | relative_url }}">خانه</a>
  <a href="{{ '/archive/' | relative_url }}">آرشیو</a>
  <a href="{{ '/categories/' | relative_url }}">موضوعات</a>
  <a href="{{ '/tags/' | relative_url }}">برچسب‌ها</a>
  <a href="{{ '/about/' | relative_url }}">درباره</a>
  <button id="theme-toggle" class="theme-toggle" type="button">
    🌙
  </button>
</nav>


  <button class="theme-toggle" id="theme-toggle" type="button">
  تغییر حالت
  </button>

    </div>
  </header>

  <main class="container site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
    </div>
  </footer>
  <script>
  const themeToggle = document.getElementById("theme-toggle");
  const savedTheme = localStorage.getItem("theme");

  if (savedTheme === "dark") {
    document.body.classList.add("dark-theme");
  }

  themeToggle.addEventListener("click", function () {
    document.body.classList.toggle("dark-theme");

    if (document.body.classList.contains("dark-theme")) {
      localStorage.setItem("theme", "dark");
    } else {
      localStorage.setItem("theme", "light");
    }
  });
</script>
<script>
  const themeToggle = document.getElementById("theme-toggle");
  const savedTheme = localStorage.getItem("theme");

  if (savedTheme === "dark") {
    document.body.classList.add("dark-mode");
    themeToggle.textContent = "☀️";
  }

  themeToggle.addEventListener("click", function () {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
      localStorage.setItem("theme", "dark");
      themeToggle.textContent = "☀️";
    } else {
      localStorage.setItem("theme", "light");
      themeToggle.textContent = "🌙";
    }
  });
</script>

</body>
</html>
