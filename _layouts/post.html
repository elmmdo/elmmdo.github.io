---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>

    <div class="post-meta">
      <span>{{ page.date | date: "%Y/%m/%d" }}</span>

      {% if page.categories %}
        <span>دسته‌بندی: {{ page.categories | join: "، " }}</span>
      {% endif %}

      {% if page.tags %}
        <span>برچسب‌ها: {{ page.tags | join: "، " }}</span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
